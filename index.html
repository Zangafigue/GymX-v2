<!doctype html>
<html lang="fr" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>GymX — Fitness Premium au Burkina Faso</title>
    <meta name="description" content="L'application de fitness premium au Burkina Faso. Réservez vos cours, suivez vos performances, gérez vos abonnements." />

    <!-- Canonical -->
    <link rel="canonical" href="https://gymx-burkina.com" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://gymx-burkina.com" />
    <meta property="og:title"       content="GymX — Fitness Premium" />

    <meta name="twitter:description" content="L'élite du fitness au Burkina Faso." />

    <!-- PWA -->
    <meta name="theme-color" content="#FF3131" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GymX" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Material Icons (Sidebar) -->

    <!-- color-scheme : appliqué dynamiquement par ThemeContext -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
